name: "Draw Keymap (PR Preview)"

on:
  pull_request:
    paths:
      - "config/roBa.keymap"
      - "keymap_drawer.config.yaml"
      - "config/roBa.dtsi"

jobs:
  draw-pr:
    name: Draw Keymap Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse and draw keymap
        run: |
          mkdir -p keymap-drawer
          CONFIG_ARG=""
          if [ -f keymap_drawer.config.yaml ]; then
            CONFIG_ARG="-c keymap_drawer.config.yaml"
          fi
          keymap parse -z config/roBa.keymap > keymap-drawer/roBa.yaml
          keymap draw $CONFIG_ARG keymap-drawer/roBa.yaml > keymap-drawer/roBa.svg

      - name: Push SVG to preview branch
        run: |
          PREVIEW_BRANCH="keymap-preview/pr-${{ github.event.pull_request.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin $PREVIEW_BRANCH 2>/dev/null || true
          git checkout --orphan $PREVIEW_BRANCH
          git reset
          cp keymap-drawer/roBa.svg roBa.svg
          git add roBa.svg
          git commit -m "keymap preview for PR #${{ github.event.pull_request.number }}"
          git push origin $PREVIEW_BRANCH --force

      - name: Post keymap preview comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: keymap-preview
          message: |
            ## Keymap Preview

            ![roBa Keymap](https://raw.githubusercontent.com/${{ github.repository }}/keymap-preview/pr-${{ github.event.pull_request.number }}/roBa.svg)

            > キャッシュが残っている場合、画像の更新に少し時間がかかることがあります。
